name: Sync Website to Public Repo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract website files
        run: |
          mkdir -p public_site
          cp index.html cases.html companies.html framework.html puts.html quotes.html public_site/
          cp -r css js data public_site/

      - name: Sync to public repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public_site

          # 初始化 git
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # 添加所有文件
          git add -A
          git commit -m "Sync website files"

          # 使用 Token 推送到公开仓库
          git push https://x-access-token:$GH_TOKEN@github.com/amandapan1996/touzi-kb.git HEAD:main --force
