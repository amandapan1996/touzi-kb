            <div class="quote-grid" id="quoteGrid">

        let currentFilter = 'all';

        // 生成语录卡片
        function renderQuotes(filter = 'all', search = '') {
            const grid = document.getElementById('quoteGrid');

            let filtered = quotes;

            // 按主题过滤
            if (filter !== 'all') {
                filtered = filtered.filter(q => q.topics.includes(filter));
            }

            // 搜索过滤
            if (search) {
                filtered = filtered.filter(q =>
                    q.text.toLowerCase().includes(search.toLowerCase())
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">没有找到匹配的语录</div>';
                return;
            }

            grid.innerHTML = filtered.map(quote => `
                <div class="quote-card">
                    <p class="text">${quote.text}</p>
                    <p class="source">—— ${quote.source}</p>
                    <div class="topics">
                        ${quote.topics.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 按主题过滤
        function filterByTopic(topic) {
            currentFilter = topic;

            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === (topic === 'all' ? '全部' : topic));
            });

            renderQuotes(topic, document.getElementById('searchInput').value);
        }

        // 搜索
        function filterQuotes() {
            const search = document.getElementById('searchInput').value;
            renderQuotes(currentFilter, search);
        }

        // 初始化
        renderQuotes();
