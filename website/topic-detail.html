<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主题详情 - 段永平投资知识库</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/companyData.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>段永平投资知识库</h1>
            <p class="subtitle">投资大佬思维框架 | 多维度索引</p>
        </div>
    </header>

    <nav>
        <div class="container">
            <a href="index.html">首页</a>
            <a href="companies.html">公司评价</a>
            <a href="topics.html">主题分类</a>
            <a href="quotes.html">经典语录</a>
            <a href="cases.html">案例分析</a>
            <a href="framework.html">决策框架</a>
            <a href="puts.html">Put交易</a>
        </div>
    </nav>

    <main class="container">
        <a href="topics.html" class="back-link">← 返回主题分类</a>

        <section>
            <div class="topic-header" id="topicHeader">
                <!-- 动态内容 -->
            </div>
        </section>

        <section>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="在相关语录中搜索..." oninput="filterQuotes()">
            </div>

            <div class="filter-bar">
                <button class="filter-btn active" data-company="all" onclick="filterByCompany(this)">全部公司</button>
                <button class="filter-btn" data-company="网易" onclick="filterByCompany(this)">网易</button>
                <button class="filter-btn" data-company="苹果" onclick="filterByCompany(this)">苹果</button>
                <button class="filter-btn" data-company="腾讯控股" onclick="filterByCompany(this)">腾讯</button>
                <button class="filter-btn" data-company="贵州茅台" onclick="filterByCompany(this)">茅台</button>
                <button class="filter-btn" data-company="阿里巴巴" onclick="filterByCompany(this)">阿里巴巴</button>
                <button class="filter-btn" data-company="雅虎" onclick="filterByCompany(this)">雅虎</button>
                <button class="filter-btn" data-company="百度" onclick="filterByCompany(this)">百度</button>
            </div>

            <div class="quotes-toolbar">
                <span id="resultsCount">显示 0 条相关语录</span>
                <select id="sortSelect" onchange="sortQuotes()">
                    <option value="page">按页码排序</option>
                    <option value="source">按来源排序</option>
                    <option value="company">按公司排序</option>
                </select>
            </div>

            <div class="quote-grid" id="quotesGrid">
                <!-- 语录卡片将通过 JavaScript 动态生成 -->
            </div>

            <button class="quotes-load-more" id="loadMoreBtn" onclick="loadMore()">加载更多</button>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>段永平投资知识库 | 基于 Karpathy llm-wiki 方法论构建</p>
            <p class="small">最后更新：2026-04-15</p>
        </div>
    </footer>

    <script>
        // ========== 主题关键词匹配 ==========
        const topicKeywords = {
            '投资理念': ['股票', '公司', '投资', '价值', '长期', '买入'],
            '能力圈': ['能力圈', '看懂', '懂', '理解', '经验', '认知', '不懂'],
            '估值': ['估值', '价格', '市值', 'PE', 'PB', '折现', 'DCF', '合理'],
            '安全边际': ['安全边际', '低估', '便宜', '折扣', '现金', '买入时机'],
            '持仓管理': ['持仓', '持有', '重仓', '仓位', '集中', '分散', '配置'],
            '风险控制': ['风险', '亏损', '亏钱', '做空', '杠杆', '借钱', '止损'],
            '护城河': ['护城河', '壁垒', '优势', '品牌', '粘性', '生态', '网络效应', '护城'],
            '企业文化': ['企业文化', '文化', '本分', '诚信', '管理层', '做对', '靠谱'],
            'Stop Doing List': ['不做', 'Stop Doing', '不为', '清单', '不做空', '不借钱'],
            '本分': ['本分', '诚信', '正直', '靠谱', '不占便宜'],
            '止损': ['止损', '及时', '发现错误', '改正', '认错'],
            '平常心': ['平常心', '淡定', '耐心', '不着急', '短期', '波动']
        };

        // ========== 状态管理 ==========
        let currentTopic = '';
        let allQuotes = [];
        let filteredQuotes = [];
        let currentFilter = 'all';
        let currentSearch = '';
        let currentSort = 'page';
        let displayCount = 20;
        const PAGE_SIZE = 20;

        // ========== 初始化 ==========
        function init() {
            const params = new URLSearchParams(window.location.search);
            currentTopic = params.get('topic') || '投资理念';

            // 渲染头部
            renderHeader();

            // 收集所有相关语录
            collectQuotes();

            // 初始渲染
            applyFilters();
        }

        // ========== 渲染头部 ==========
        function renderHeader() {
            const topicData = topics.find(t => t.name === currentTopic);
            const header = document.getElementById('topicHeader');

            if (topicData) {
                header.innerHTML = `
                    <h2>${topicData.name}</h2>
                    <p class="description">${topicData.description}</p>
                    <div class="topic-keywords">
                        ${topicData.keyPoints.map(k => `<span class="keyword-tag">${k}</span>`).join('')}
                    </div>
                    <p class="topic-stats">共找到 <strong>${allQuotes.length}</strong> 条相关语录</p>
                `;
                document.title = `${topicData.name} - 段永平投资知识库`;
            } else {
                header.innerHTML = `
                    <h2>${currentTopic}</h2>
                    <p class="description">关于 "${currentTopic}" 的相关语录</p>
                    <p class="topic-stats">共找到 <strong>${allQuotes.length}</strong> 条相关语录</p>
                `;
            }
        }

        // ========== 收集语录 ==========
        function collectQuotes() {
            const keywords = topicKeywords[currentTopic] || [currentTopic];

            for (const [company, data] of Object.entries(companyData)) {
                if (data.quotes && Array.isArray(data.quotes)) {
                    data.quotes.forEach(quote => {
                        const text = quote.text.toLowerCase();
                        const matches = keywords.some(kw =>
                            text.includes(kw.toLowerCase())
                        );
                        if (matches) {
                            allQuotes.push({
                                ...quote,
                                company: company
                            });
                        }
                    });
                }
            }

            // 按页码排序
            allQuotes.sort((a, b) => a.page - b.page);
        }

        // ========== 筛选逻辑 ==========
        function applyFilters() {
            // 1. 过滤公司
            if (currentFilter === 'all') {
                filteredQuotes = [...allQuotes];
            } else {
                filteredQuotes = allQuotes.filter(q => q.company === currentFilter);
            }

            // 2. 搜索过滤
            if (currentSearch) {
                const search = currentSearch.toLowerCase();
                filteredQuotes = filteredQuotes.filter(q =>
                    q.text.toLowerCase().includes(search)
                );
            }

            // 3. 排序（已在 collectQuotes 中按页码排序，这里重新排序）
            sortQuotesData();

            // 4. 重置显示数量并渲染
            displayCount = PAGE_SIZE;
            renderQuotesList();
        }

        function sortQuotesData() {
            filteredQuotes.sort((a, b) => {
                if (currentSort === 'page') {
                    return a.page - b.page;
                } else if (currentSort === 'source') {
                    return a.source.localeCompare(b.source);
                } else {
                    return a.company.localeCompare(b.company);
                }
            });
        }

        // ========== 渲染语录列表 ==========
        function renderQuotesList() {
            const grid = document.getElementById('quotesGrid');
            const visibleQuotes = filteredQuotes.slice(0, displayCount);
            const countEl = document.getElementById('resultsCount');

            // 更新统计
            countEl.textContent = `显示 ${visibleQuotes.length} / ${filteredQuotes.length} 条`;

            // 高亮搜索文本
            function highlight(text) {
                if (!currentSearch) return text;
                const regex = new RegExp(`(${currentSearch})`, 'gi');
                return text.replace(regex, '<mark>$1</mark>');
            }

            // 渲染
            grid.innerHTML = visibleQuotes.map(q => `
                <div class="quote-card">
                    <div class="quote-text">${highlight(q.text)}</div>
                    <div class="quote-company">${q.company}</div>
                    <div class="quote-source">
                        <span>${q.source}</span>
                        <span>第 ${q.page} 页</span>
                    </div>
                </div>
            `).join('');

            // 显示/隐藏加载更多按钮
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            loadMoreBtn.style.display = displayCount >= filteredQuotes.length ? 'none' : 'block';

            // 空状态提示
            if (filteredQuotes.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <p>没有找到与 "${currentTopic}" 相关的语录</p>
                        <p class="small">尝试其他关键词或筛选条件</p>
                    </div>
                `;
                loadMoreBtn.style.display = 'none';
            }
        }

        // ========== 事件处理 ==========
        function filterQuotes() {
            currentSearch = document.getElementById('searchInput').value;
            applyFilters();
        }

        function filterByCompany(btn) {
            document.querySelectorAll('.filter-bar .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.company;
            applyFilters();
        }

        function sortQuotes() {
            currentSort = document.getElementById('sortSelect').value;
            sortQuotesData();
            renderQuotesList();
        }

        function loadMore() {
            displayCount += PAGE_SIZE;
            renderQuotesList();
        }

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', init);
    </script>

    <style>
        .topic-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .topic-header h2 {
            color: white;
            border: none;
            margin-bottom: 15px;
        }
        .topic-header .description {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 20px;
            opacity: 0.95;
        }
        .topic-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        .keyword-tag {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .topic-stats {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .topic-stats strong {
            color: var(--accent);
        }

        /* 语录卡片 */
        .quote-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .quote-card .quote-text {
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 12px;
        }
        .quote-card .quote-text mark {
            background: #fff3cd;
            padding: 0 2px;
        }
        .quote-card .quote-company {
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 8px;
        }
        .quote-card .quote-source {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* 工具栏 */
        .quotes-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        .quotes-toolbar select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
        }

        /* 加载更多 */
        .quotes-load-more {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .quotes-load-more:hover {
            background: var(--primary);
            color: white;
        }

        /* 空状态 */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .no-results p {
            margin-bottom: 10px;
        }
        .no-results .small {
            font-size: 0.85rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .topic-header {
                padding: 25px;
            }
            .quotes-toolbar {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</body>
</html>
