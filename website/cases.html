<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司点评与案例分析 - 段永平投资知识库</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/companyData.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>段永平投资知识库</h1>
            <p class="subtitle">投资大佬思维框架 | 多维度索引</p>
        </div>
    </header>

    <nav>
        <div class="container">
            <a href="index.html">首页</a>
            <a href="cases.html" class="active">公司点评与案例</a>
            <a href="topics.html">主题分类</a>
            <a href="quotes.html">经典语录</a>
            <a href="framework.html">决策框架</a>
            <a href="puts.html">Put交易</a>
        </div>
    </nav>

    <main class="container">
        <a href="index.html" class="back-link">← 返回首页</a>

        <section>
            <h2>公司点评与案例分析</h2>
            <p style="color: var(--text-secondary); margin-bottom: 15px;">
                段永平的真实投资案例（含买入）和点评公司的分析思路：买入逻辑、持有原则、变化过程。
            </p>

            <!-- 持仓状态图例 -->
            <div class="position-legend">
                <span class="legend-item">
                    <span class="legend-dot" style="background: #38a169;"></span>
                    买入股票（主要持仓）
                </span>
                <span class="legend-item">
                    <span class="legend-dot" style="background: #3182ce;"></span>
                    卖出 Put（义务仓）
                </span>
                <span class="legend-item">
                    <span class="legend-dot" style="background: #c53030;"></span>
                    买入 Put（做空亏损/关注）
                </span>
                <span class="legend-item">
                    <span class="legend-dot" style="background: #718096;"></span>
                    点评关注
                </span>
                <span class="legend-item">
                    <span class="legend-dot" style="background: #d69e2e;"></span>
                    巴菲特案例学习
                </span>
            </div>

            <!-- 公司类型筛选 -->
            <div class="filter-section">
                <div class="filter-tabs">
                    <button class="tab-btn active" onclick="filterCompanies('all')">全部 <span id="count-all">0</span></button>
                    <button class="tab-btn" onclick="filterCompanies('stock')">买入股票 <span id="count-stock">0</span></button>
                    <button class="tab-btn" onclick="filterCompanies('put')">Put交易 <span id="count-put">0</span></button>
                    <button class="tab-btn" onclick="filterCompanies('watching')">点评关注 <span id="count-watching">0</span></button>
                    <button class="tab-btn" onclick="filterCompanies('lesson')">教训案例 <span id="count-lesson">0</span></button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索公司..." onkeyup="searchCompanies()">
                </div>
            </div>
        </section>

        <!-- 公司列表视图 -->
        <section id="companyList">
            <div class="company-grid" id="companyGrid"></div>
            <p style="color: var(--text-secondary); margin-top: 20px; font-size: 0.85rem;">
                共收录 <strong id="totalCount">0</strong> 家公司
            </p>
        </section>

        <!-- 公司详情视图 -->
        <section id="companyDetail" style="display: none;">
            <a href="javascript:showList()" class="back-link">← 返回公司列表</a>
            <div id="detailContent"></div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>段永平投资知识库 | 基于 Karpathy llm-wiki 方法论构建</p>
            <p class="small">最后更新：2026-04-15</p>
        </div>
    </footer>

    <script>
        // ========== 配置 ==========
        const positionConfig = {
            'stock': { icon: '📈', label: '买入股票', color: '#38a169', bg: '#e8f5e9', desc: '主要持仓' },
            'sell-put': { icon: '💰', label: '卖出 Put', color: '#3182ce', bg: '#ebf8ff', desc: '义务仓' },
            'put': { icon: '📉', label: '买入 Put', color: '#c53030', bg: '#ffebee', desc: '做空/关注' },
            'watching': { icon: '👀', label: '关注点评', color: '#718096', bg: '#f7fafc', desc: '分析关注' },
            'learning': { icon: '📚', label: '案例学习', color: '#d69e2e', bg: '#fffff0', desc: '巴菲特案例' },
            'entrepreneur': { icon: '🏢', label: '创业公司', color: '#dd6b20', bg: '#fffaf0', desc: '自创企业' }
        };

        // 7个重点案例的详细分析数据
        const caseAnalysisData = {
            '网易': {
                investmentProcess: [
                    { stage: '关注', date: '2000年', desc: '做小霸王时理解游戏行业' },
                    { stage: '买入股票', date: '2001-2002', desc: '互联网泡沫，股价跌至0.8美元，现金超过市值', price: '约$0.8/股' },
                    { stage: '持有', date: '2002-2006', desc: '公司转型游戏成功，业绩爆发' },
                    { stage: '部分减持', date: '2006年后', desc: '逐步变成历史持仓' }
                ],
                keyInsights: [
                    '在能力圈内投资 - 做游戏出身，理解游戏行业',
                    '极端低估时买入 - 现金超过市值',
                    '风险可控 - 即使最坏情况也不会亏光',
                    '敢重仓需要深入理解'
                ]
            },
            '苹果': {
                investmentProcess: [
                    { stage: '关注', date: '2011年初', desc: '乔布斯去世，市场担忧苹果未来' },
                    { stage: '首次买入', date: '2011-01-21', desc: '把去年赚的钱都放进去了', price: '约$44/股，市值约3000亿美元' },
                    { stage: '持续买入', date: '2011年', desc: '越跌越买，认为苹果依然低PE高增长' },
                    { stage: '持有', date: '2011-至今', desc: '逻辑不变就一直持有' }
                ],
                keyInsights: [
                    '好的生意模式具有很宽的护城河',
                    '买股票就是买公司未来现金流折现',
                    '必须在能力圈内，只买自己懂的',
                    '买入的逻辑没变，股价越低越应该高兴'
                ]
            },
            '腾讯控股': {
                investmentProcess: [
                    { stage: '关注', date: '2015年底', desc: '看好微信的社交网络护城河' },
                    { stage: '首次买入', date: '2015-12', desc: '开始买入腾讯', price: '一直没买是因为懒得调钱去香港' },
                    { stage: '持有', date: '2015-至今', desc: '用平常心对待市场波动' }
                ],
                keyInsights: [
                    '微信的社交网络护城河非常宽',
                    '只要买入逻辑没变就一直持有',
                    '用平常心对待短期波动'
                ]
            },
            '贵州茅台': {
                investmentProcess: [
                    { stage: '关注', date: '2013年初', desc: '塑化剂风波后开始关注' },
                    { stage: '首次买入', date: '2013-02', desc: '最近这段时间才开始买的', price: '当时茅台手里有200块钱现金' },
                    { stage: '持有', date: '2013-至今', desc: '品牌护城河依然在' }
                ],
                keyInsights: [
                    '买股票就是买公司，买公司就是买未来现金流',
                    '先款后货的商业模式非常健康',
                    '品牌护城河是最强的竞争优势',
                    '管理层本分是投资前提'
                ]
            },
            '阿里巴巴': {
                investmentProcess: [
                    { stage: '关注', date: '2010-2011', desc: '通过雅虎了解阿里' },
                    { stage: '买入雅虎', date: '2010-2012', desc: '买雅虎是为了买淘宝和阿里巴巴集团', price: '雅虎持有阿里40%+股份' },
                    { stage: '卖出雅虎', date: '2012年后', desc: '阿里上市后，溢价消失' }
                ],
                keyInsights: [
                    '买雅虎是为了买淘宝和阿里巴巴集团',
                    '对直接投资阿里有顾虑'
                ]
            },
            '雅虎': {
                investmentProcess: [
                    { stage: '买入股票', date: '2010-2012', desc: '股价低于阿里持股价值', price: '雅虎持有阿里40%+股份' },
                    { stage: '卖出', date: '2012年后', desc: '阿里上市后，溢价消失' }
                ],
                keyInsights: [
                    '雅虎只是持有阿里的工具',
                    '估值要动态看'
                ]
            },
            '百度': {
                investmentProcess: [
                    { stage: '关注', date: '2010年', desc: '看到一些"不对"的东西' },
                    { stage: '买入 Put', date: '2010年', desc: '开始做空百度', price: '后来被"夹空"' },
                    { stage: '亏损', date: '2010年', desc: '股价不跌反涨，被迫止损', price: '亏损1.5-2亿美元' }
                ],
                keyInsights: [
                    '做空是愚蠢的！',
                    '老巴的教导千万别忘：不做空，不借钱，不做不懂的东西',
                    '失去平常心就会做蠢事',
                    '做空风险无限，代价惨重'
                ]
            }
        };

        // ========== 状态 ==========
        let currentFilter = 'all';
        let currentSearch = '';

        // ========== 公司数据处理 ==========
        function getCompanyList() {
            return Object.keys(companyData).map(name => ({
                name: name,
                ...companyData[name]
            }));
        }

        function getPositionStatus(company) {
            // 根据 type 和 returnInfo 判断持仓状态
            const type = company.type || '';
            const returnInfo = company.returnInfo || '';

            if (type === '持仓公司' || returnInfo.includes('长期持')) {
                return 'stock';
            }
            if (type === '历史持仓') {
                if (returnInfo.includes('100倍') || returnInfo.includes('已清仓')) {
                    return 'stock';
                }
                return 'watching';
            }
            if (type === '教训案例') {
                if (returnInfo.includes('做空')) {
                    return 'put';
                }
                return 'lesson';
            }
            if (type === '创业公司' || type === '关联公司' || type === '早期创业') {
                return 'entrepreneur';
            }
            if (type === '学习案例') {
                return 'learning';
            }
            if (returnInfo.includes('Put') || returnInfo.includes('做空')) {
                return 'put';
            }
            if (returnInfo.includes('间接持')) {
                return 'stock';
            }
            return 'watching';
        }

        function countByCategory() {
            const list = getCompanyList();
            return {
                all: list.length,
                stock: list.filter(c => getPositionStatus(c) === 'stock').length,
                put: list.filter(c => ['put', 'sell-put'].includes(getPositionStatus(c))).length,
                watching: list.filter(c => ['watching', 'entrepreneur'].includes(getPositionStatus(c))).length,
                lesson: list.filter(c => getPositionStatus(c) === 'lesson').length
            };
        }

        // ========== 渲染 ==========
        function renderCompanies() {
            const grid = document.getElementById('companyGrid');
            let companies = getCompanyList();

            // 应用筛选
            if (currentFilter !== 'all') {
                if (currentFilter === 'stock') {
                    companies = companies.filter(c => getPositionStatus(c) === 'stock');
                } else if (currentFilter === 'put') {
                    companies = companies.filter(c => ['put', 'sell-put'].includes(getPositionStatus(c)));
                } else if (currentFilter === 'watching') {
                    companies = companies.filter(c => ['watching', 'entrepreneur'].includes(getPositionStatus(c)));
                } else if (currentFilter === 'lesson') {
                    companies = companies.filter(c => getPositionStatus(c) === 'lesson');
                }
            }

            // 应用搜索
            if (currentSearch) {
                companies = companies.filter(c =>
                    c.name.toLowerCase().includes(currentSearch.toLowerCase())
                );
            }

            // 按持仓状态和语录数排序
            const priority = { 'stock': 0, 'sell-put': 1, 'put': 2, 'lesson': 3, 'watching': 4, 'entrepreneur': 5, 'learning': 6 };
            companies.sort((a, b) => {
                const pa = priority[getPositionStatus(a)] ?? 9;
                const pb = priority[getPositionStatus(b)] ?? 9;
                if (pa !== pb) return pa - pb;
                return (b.quoteCount || 0) - (a.quoteCount || 0);
            });

            // 统计
            document.getElementById('totalCount').textContent = companies.length;

            if (companies.length === 0) {
                grid.innerHTML = '<div class="no-results">没有找到匹配的公司</div>';
                return;
            }

            grid.innerHTML = companies.map(company => {
                const position = getPositionStatus(company);
                const config = positionConfig[position] || positionConfig['watching'];
                const hasDetail = caseAnalysisData[company.name];

                return `
                    <div class="company-card ${hasDetail ? 'has-detail' : ''}" onclick="showCompanyDetail('${company.name}')">
                        <div class="card-header">
                            <h3>${company.name}</h3>
                            <span class="position-badge" style="background: ${config.bg}; color: ${config.color}; border: 1px solid ${config.color};">
                                ${config.icon} ${config.label}
                            </span>
                        </div>
                        ${company.symbol ? `<div class="symbol">${company.symbol}</div>` : ''}
                        <div class="card-meta">
                            <span class="quote-count">${company.quoteCount || 0} 条语录</span>
                            <span class="type-tag">${company.type || '未分类'}</span>
                        </div>
                        <div class="return-info">${company.returnInfo || ''}</div>
                        ${hasDetail ? '<div class="has-analysis">点击查看投资分析 →</div>' : ''}
                    </div>
                `;
            }).join('');
        }

        // ========== 公司详情 ==========
        function showCompanyDetail(name) {
            const company = companyData[name];
            if (!company) return;

            document.getElementById('companyList').style.display = 'none';
            document.getElementById('companyDetail').style.display = 'block';

            const position = getPositionStatus(company);
            const config = positionConfig[position] || positionConfig['watching'];
            const hasAnalysis = caseAnalysisData[name];
            const quotes = company.quotes || [];

            let detailHtml = `
                <div class="case-header">
                    <h2>${name} ${company.symbol ? `<span class="symbol">${company.symbol}</span>` : ''}</h2>
                    <div class="case-meta">
                        <span class="position-badge" style="background: ${config.bg}; color: ${config.color}; border: 1px solid ${config.color};">
                            ${config.icon} ${config.label}
                        </span>
                        <span>类型：${company.type || '未分类'}</span>
                        <span>投资状态：${company.returnInfo || '未明确'}</span>
                        <span>语录：${company.quoteCount || 0}条</span>
                    </div>
                </div>

                <div class="case-content">
            `;

            // 如果有详细分析数据
            if (hasAnalysis) {
                const analysis = caseAnalysisData[name];

                // 投资过程时间线
                if (analysis.investmentProcess && analysis.investmentProcess.length > 0) {
                    detailHtml += `
                        <h3>投资过程</h3>
                        <div class="investment-process">
                            ${analysis.investmentProcess.map((step, idx) => {
                                const stepConfig = positionConfig[
                                    step.stage.includes('Put') ? (step.stage.includes('卖出') ? 'sell-put' : 'put') :
                                    step.stage.includes('亏损') ? 'put' :
                                    step.stage.includes('关注') || step.stage.includes('间接') ? 'watching' : 'stock'
                                ] || positionConfig['watching'];
                                return `
                                    <div class="process-step">
                                        <div class="step-number" style="background: ${stepConfig.color};">${idx + 1}</div>
                                        <div class="step-content">
                                            <div class="step-header">
                                                <span class="step-stage" style="color: ${stepConfig.color};">${step.stage}</span>
                                                ${step.date ? `<span class="step-date">${step.date}</span>` : ''}
                                            </div>
                                            <div class="step-desc">${step.desc}</div>
                                            ${step.price ? `<div class="step-price">💰 ${step.price}</div>` : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `;
                }

                // 关键洞见
                if (analysis.keyInsights && analysis.keyInsights.length > 0) {
                    detailHtml += `
                        <h3>关键洞见</h3>
                        <ul class="insights-list">
                            ${analysis.keyInsights.map(insight => `<li>${insight}</li>`).join('')}
                        </ul>
                    `;
                }
            }

            // 语录查看器
            detailHtml += `
                <h3>相关语录（共 ${quotes.length} 条）</h3>
                <div class="quotes-section">
                    <button class="quotes-toggle-btn" onclick="toggleQuotes(this)">
                        <span class="quotes-count">点击展开语录</span>
                        <span class="quotes-icon">▾</span>
                    </button>
                    <div class="quotes-panel" style="display: none;">
                        <div class="quotes-search">
                            <input type="text" placeholder="搜索语录..." oninput="filterQuotes(this.value)">
                        </div>
                        <div class="quotes-filters">
                            <button class="filter-btn active" data-type="all" onclick="filterByType(this)">全部</button>
                            <button class="filter-btn" data-type="qa" onclick="filterByType(this)">💬 问答形式</button>
                            <button class="filter-btn" data-type="article" onclick="filterByType(this)">📝 博客文章</button>
                        </div>
                        <div class="quotes-filters quotes-sources">
                            <span class="filter-label">来源：</span>
                            <button class="filter-btn active" data-source="all" onclick="filterBySource(this)">全部</button>
                            <button class="filter-btn" data-source="投资逻辑篇" onclick="filterBySource(this)">投资逻辑篇</button>
                            <button class="filter-btn" data-source="商业逻辑篇" onclick="filterBySource(this)">商业逻辑篇</button>
                            <button class="filter-btn" data-source="博客文章合集" onclick="filterBySource(this)">博客文章合集</button>
                            <button class="filter-btn" data-source="帖子合集" onclick="filterBySource(this)">帖子合集</button>
                        </div>
                        <div class="quotes-toolbar">
                            <span class="quotes-results-count">显示 10 / ${quotes.length} 条</span>
                            <select class="quotes-sort" onchange="sortQuotes(this.value)">
                                <option value="page">按页码</option>
                                <option value="source">按来源</option>
                            </select>
                        </div>
                        <div class="quotes-list"></div>
                        <button class="quotes-load-more" onclick="loadMoreQuotes()">加载更多</button>
                    </div>
                </div>
            `;

            detailHtml += '</div>';

            document.getElementById('detailContent').innerHTML = detailHtml;

            // 初始化语录状态
            window.currentCompanyQuotes = quotes;
            window.filteredQuotes = [...quotes];
            window.currentQuoteType = 'all';
            window.currentQuoteSource = 'all';
            window.currentQuoteSearch = '';
            window.currentQuoteSort = 'page';
            window.displayCount = 10;

            window.scrollTo(0, 0);
        }

        // ========== 语录查看器功能 ==========
        function toggleQuotes(btn) {
            const panel = btn.nextElementSibling;
            const isOpen = panel.style.display !== 'none';

            if (isOpen) {
                panel.style.display = 'none';
                btn.querySelector('.quotes-icon').textContent = '▾';
            } else {
                panel.style.display = 'block';
                btn.querySelector('.quotes-icon').textContent = '▴';
                if (!panel.dataset.initialized) {
                    renderQuotesList();
                    panel.dataset.initialized = 'true';
                }
            }
        }

        function filterQuotes(searchText) {
            window.currentQuoteSearch = searchText;
            applyQuoteFilters();
        }

        function filterByType(btn) {
            document.querySelectorAll('.quotes-filters .filter-btn[data-type]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            window.currentQuoteType = btn.dataset.type;
            applyQuoteFilters();
        }

        function filterBySource(btn) {
            document.querySelectorAll('.quotes-sources .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            window.currentQuoteSource = btn.dataset.source;
            applyQuoteFilters();
        }

        function getQuoteType(text) {
            // 判断是否为问答形式
            if (text.includes('网友') && text.includes('段永平')) {
                return 'qa';
            }
            return 'article';
        }

        function sortQuotes(sortType) {
            window.currentQuoteSort = sortType;
            applyQuoteFilters();
        }

        function applyQuoteFilters() {
            let quotes = [...window.currentCompanyQuotes];

            // 类型筛选
            if (window.currentQuoteType && window.currentQuoteType !== 'all') {
                quotes = quotes.filter(q => getQuoteType(q.text) === window.currentQuoteType);
            }

            // 来源筛选
            if (window.currentQuoteSource && window.currentQuoteSource !== 'all') {
                quotes = quotes.filter(q => q.source === window.currentQuoteSource);
            }

            // 搜索筛选
            if (window.currentQuoteSearch) {
                const search = window.currentQuoteSearch.toLowerCase();
                quotes = quotes.filter(q => q.text.toLowerCase().includes(search));
            }

            // 排序
            quotes.sort((a, b) => {
                if (window.currentQuoteSort === 'page') {
                    return (a.page || 0) - (b.page || 0);
                } else {
                    return (a.source || '').localeCompare(b.source || '');
                }
            });

            window.filteredQuotes = quotes;
            window.displayCount = 10;
            renderQuotesList();
        }

        function renderQuotesList() {
            const list = document.querySelector('.quotes-list');
            if (!list) return;

            const visibleQuotes = window.filteredQuotes.slice(0, window.displayCount);
            const toolbar = document.querySelector('.quotes-toolbar');

            if (toolbar) {
                toolbar.querySelector('.quotes-results-count').textContent =
                    `显示 ${visibleQuotes.length} / ${window.filteredQuotes.length} 条`;
            }

            list.innerHTML = visibleQuotes.map(q => {
                const highlightText = (text, search) => {
                    if (!search) return text;
                    const regex = new RegExp(`(${search})`, 'gi');
                    return text.replace(regex, '<mark>$1</mark>');
                };

                const quoteType = getQuoteType(q.text);
                const typeIcon = quoteType === 'qa' ? '💬' : '📝';
                const typeLabel = quoteType === 'qa' ? '问答' : '文章';

                return `
                    <div class="quote-item ${quoteType === 'qa' ? 'quote-qa' : 'quote-article'}">
                        <div class="quote-type-badge">${typeIcon} ${typeLabel}</div>
                        <div class="quote-text">${highlightText(q.text, window.currentQuoteSearch)}</div>
                        <div class="quote-meta">
                            <span class="quote-source">${q.source || '未知来源'}</span>
                            ${q.page ? `<span class="quote-page">第 ${q.page} 页</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            const loadMoreBtn = document.querySelector('.quotes-load-more');
            if (loadMoreBtn) {
                loadMoreBtn.style.display = window.displayCount >= window.filteredQuotes.length ? 'none' : 'block';
            }
        }

        function loadMoreQuotes() {
            window.displayCount += 10;
            renderQuotesList();
        }

        // ========== 返回列表 ==========
        function showList() {
            document.getElementById('companyList').style.display = 'block';
            document.getElementById('companyDetail').style.display = 'none';
        }

        // ========== 筛选和搜索 ==========
        function filterCompanies(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tabs .tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.onclick.toString().includes(`'${filter}'`)) {
                    btn.classList.add('active');
                }
            });
            renderCompanies();
        }

        function searchCompanies() {
            currentSearch = document.getElementById('searchInput').value;
            renderCompanies();
        }

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', function() {
            // 更新分类统计
            const counts = countByCategory();
            document.getElementById('count-all').textContent = counts.all;
            document.getElementById('count-stock').textContent = counts.stock;
            document.getElementById('count-put').textContent = counts.put;
            document.getElementById('count-watching').textContent = counts.watching;
            document.getElementById('count-lesson').textContent = counts.lesson;

            renderCompanies();
        });
    </script>
