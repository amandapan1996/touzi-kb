        let currentFilter = 'all';
        let cloudCollapsed = false;

        // 切换标签云显示
        function toggleCloud() {
            const cloud = document.getElementById('keywordCloud');
            const toggleBtn = document.querySelector('.cloud-toggle');
            cloudCollapsed = !cloudCollapsed;

            if (cloudCollapsed) {
                cloud.style.display = 'none';
                toggleBtn.textContent = '展开 ↓';
            } else {
                cloud.style.display = 'flex';
                toggleBtn.textContent = '收起 ↑';
            }
        }

        // 按主题过滤
        function filterByTopic(topic, btn) {
            currentFilter = topic;

            // 更新标签状态
            document.querySelectorAll('.keyword-tag').forEach(t => t.classList.remove('active'));
            if (btn) {
                btn.classList.add('active');
            } else {
                document.querySelector(`[data-topic="${topic}"]`)?.classList.add('active');
            }

            // 更新统计
            document.getElementById('currentTopic').textContent = topic === 'all' ? '全部' : topic;

            renderQuotes(topic, document.getElementById('searchInput').value);
        }

        // 生成语录卡片
        function renderQuotes(filter = 'all', search = '') {
            const grid = document.getElementById('quoteGrid');

            let filtered = quotes;

            // 按主题过滤
            if (filter !== 'all') {
                filtered = filtered.filter(q => q.topics.includes(filter));
            }

            // 搜索过滤
            if (search) {
                filtered = filtered.filter(q =>
                    q.text.toLowerCase().includes(search.toLowerCase())
                );
            }

            // 更新计数
            document.getElementById('quoteCount').textContent = `共 ${filtered.length} 条语录`;

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">没有找到匹配的语录</div>';
                return;
            }

            grid.innerHTML = filtered.map((quote, idx) => `
                <div class="quote-card" style="animation-delay: ${idx * 50}ms">
                    <p class="text">${quote.text}</p>
                    <div class="quote-footer">
                        <p class="source">—— ${quote.source}</p>
                        <div class="topics">
                            ${quote.topics.map(t => `<span class="tag">${t}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 搜索
        function filterQuotes() {
            const search = document.getElementById('searchInput').value;
            renderQuotes(currentFilter, search);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderQuotes();
            document.getElementById('quoteCount').textContent = `共 ${quotes.length} 条语录`;
        });
